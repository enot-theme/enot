<text x="34" y="30" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="13" fill="#5f5e5c" text-anchor="end" xml:space="preserve">1</text>
<text x="46" y="30" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="13" fill="#e2d7b5" text-anchor="start" xml:space="preserve"><tspan fill="#83817e" font-style="italic"># earthy accents: one L*, one C*</tspan></text>
<text x="34" y="52" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="13" fill="#5f5e5c" text-anchor="end" xml:space="preserve">2</text>
<text x="46" y="52" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="13" fill="#e2d7b5" text-anchor="start" xml:space="preserve"><tspan fill="#d7a0a1">from</tspan><tspan fill="#e2d7b5"> math </tspan><tspan fill="#d7a0a1">import</tspan><tspan fill="#e2d7b5"> cos, sin, radians</tspan></text>
<text x="34" y="74" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="13" fill="#5f5e5c" text-anchor="end" xml:space="preserve">3</text>
<text x="34" y="96" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="13" fill="#5f5e5c" text-anchor="end" xml:space="preserve">4</text>
<text x="46" y="96" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="13" fill="#e2d7b5" text-anchor="start" xml:space="preserve"><tspan fill="#d7a0a1">def</tspan><tspan fill="#e2d7b5"> </tspan><tspan fill="#bab04d">lch_to_lab</tspan><tspan fill="#e2d7b5">(l, c, h):</tspan></text>
<text x="34" y="118" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="13" fill="#5f5e5c" text-anchor="end" xml:space="preserve">5</text>
<text x="46" y="118" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="13" fill="#e2d7b5" text-anchor="start" xml:space="preserve"><tspan fill="#e2d7b5">    </tspan><tspan fill="#9ff5e3">"""CIELAB from cylindrical coordinates."""</tspan></text>
<text x="34" y="140" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="13" fill="#5f5e5c" text-anchor="end" xml:space="preserve">6</text>
<text x="46" y="140" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="13" fill="#e2d7b5" text-anchor="start" xml:space="preserve"><tspan fill="#e2d7b5">    hr = </tspan><tspan fill="#79cad9">radians</tspan><tspan fill="#e2d7b5">(h)</tspan></text>
<text x="34" y="162" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="13" fill="#5f5e5c" text-anchor="end" xml:space="preserve">7</text>
<text x="46" y="162" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="13" fill="#e2d7b5" text-anchor="start" xml:space="preserve"><tspan fill="#e2d7b5">    </tspan><tspan fill="#d7a0a1">return</tspan><tspan fill="#e2d7b5"> l, c * </tspan><tspan fill="#79cad9">cos</tspan><tspan fill="#e2d7b5">(hr), c * </tspan><tspan fill="#79cad9">sin</tspan><tspan fill="#e2d7b5">(hr)</tspan></text>
<text x="34" y="184" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="13" fill="#5f5e5c" text-anchor="end" xml:space="preserve">8</text>
<text x="34" y="206" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="13" fill="#5f5e5c" text-anchor="end" xml:space="preserve">9</text>
<text x="46" y="206" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="13" fill="#e2d7b5" text-anchor="start" xml:space="preserve"><tspan fill="#fde494">HUES</tspan><tspan fill="#e2d7b5"> = {</tspan><tspan fill="#9ff5e3">"red"</tspan><tspan fill="#e2d7b5">: </tspan><tspan fill="#c37fa1">22</tspan><tspan fill="#e2d7b5">, </tspan><tspan fill="#9ff5e3">"green"</tspan><tspan fill="#e2d7b5">: </tspan><tspan fill="#c37fa1">128</tspan><tspan fill="#e2d7b5">, </tspan><tspan fill="#9ff5e3">"blue"</tspan><tspan fill="#e2d7b5">: </tspan><tspan fill="#c37fa1">215</tspan><tspan fill="#e2d7b5">}</tspan></text>
<text x="34" y="228" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="13" fill="#5f5e5c" text-anchor="end" xml:space="preserve">10</text>
<text x="34" y="250" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="13" fill="#5f5e5c" text-anchor="end" xml:space="preserve">11</text>
<text x="46" y="250" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="13" fill="#e2d7b5" text-anchor="start" xml:space="preserve"><tspan fill="#d7a0a1">for</tspan><tspan fill="#e2d7b5"> name, hue </tspan><tspan fill="#d7a0a1">in</tspan><tspan fill="#e2d7b5"> HUES.</tspan><tspan fill="#79cad9">items</tspan><tspan fill="#e2d7b5">():</tspan></text>
<text x="34" y="272" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="13" fill="#beb69c" text-anchor="end" xml:space="preserve">12</text>
<text x="46" y="272" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="13" fill="#e2d7b5" text-anchor="start" xml:space="preserve"><tspan fill="#e2d7b5">    lab = </tspan><tspan fill="#bab04d">lch_to_lab</tspan><tspan fill="#e2d7b5">(</tspan><tspan fill="#c37fa1">72.0</tspan><tspan fill="#e2d7b5">, </tspan><tspan fill="#c37fa1">26.0</tspan><tspan fill="#e2d7b5">, hue)</tspan></text>
<text x="34" y="294" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="13" fill="#5f5e5c" text-anchor="end" xml:space="preserve">13</text>
<text x="46" y="294" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="13" fill="#e2d7b5" text-anchor="start" xml:space="preserve"><tspan fill="#e2d7b5">    </tspan><tspan fill="#ad8764">print</tspan><tspan fill="#e2d7b5">(</tspan><tspan fill="#9ff5e3">f"lab={lab}"</tspan><tspan fill="#e2d7b5">)</tspan></text>
