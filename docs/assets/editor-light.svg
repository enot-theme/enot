<rect x="6" y="257" width="628" height="22" fill="#e7e5e1"/>
<text x="34" y="30" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="13" fill="#b3b0ab" text-anchor="end" xml:space="preserve">1</text>
<text x="46" y="30" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="13" fill="#48443e" text-anchor="start" xml:space="preserve"><tspan fill="#9b9893" font-style="italic"># earthy accents: one L*, one C*</tspan></text>
<text x="34" y="52" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="13" fill="#b3b0ab" text-anchor="end" xml:space="preserve">2</text>
<text x="46" y="52" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="13" fill="#48443e" text-anchor="start" xml:space="preserve"><tspan fill="#9d5a5d">from</tspan><tspan fill="#48443e"> math </tspan><tspan fill="#9d5a5d">import</tspan><tspan fill="#48443e"> cos, sin, radians</tspan></text>
<text x="34" y="74" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="13" fill="#b3b0ab" text-anchor="end" xml:space="preserve">3</text>
<text x="34" y="96" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="13" fill="#b3b0ab" text-anchor="end" xml:space="preserve">4</text>
<text x="46" y="96" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="13" fill="#48443e" text-anchor="start" xml:space="preserve"><tspan fill="#9d5a5d">def</tspan><tspan fill="#48443e"> </tspan><tspan fill="#495a38">lch_to_lab</tspan><tspan fill="#48443e">(l, c, h):</tspan></text>
<text x="34" y="118" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="13" fill="#b3b0ab" text-anchor="end" xml:space="preserve">5</text>
<text x="46" y="118" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="13" fill="#48443e" text-anchor="start" xml:space="preserve"><tspan fill="#48443e">    </tspan><tspan fill="#09797c">"""CIELAB from cylindrical coordinates."""</tspan></text>
<text x="34" y="140" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="13" fill="#b3b0ab" text-anchor="end" xml:space="preserve">6</text>
<text x="46" y="140" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="13" fill="#48443e" text-anchor="start" xml:space="preserve"><tspan fill="#48443e">    hr = </tspan><tspan fill="#0c6a96">radians</tspan><tspan fill="#48443e">(h)</tspan></text>
<text x="34" y="162" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="13" fill="#b3b0ab" text-anchor="end" xml:space="preserve">7</text>
<text x="46" y="162" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="13" fill="#48443e" text-anchor="start" xml:space="preserve"><tspan fill="#48443e">    </tspan><tspan fill="#9d5a5d">return</tspan><tspan fill="#48443e"> l, c * </tspan><tspan fill="#0c6a96">cos</tspan><tspan fill="#48443e">(hr), c * </tspan><tspan fill="#0c6a96">sin</tspan><tspan fill="#48443e">(hr)</tspan></text>
<text x="34" y="184" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="13" fill="#b3b0ab" text-anchor="end" xml:space="preserve">8</text>
<text x="34" y="206" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="13" fill="#b3b0ab" text-anchor="end" xml:space="preserve">9</text>
<text x="46" y="206" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="13" fill="#48443e" text-anchor="start" xml:space="preserve"><tspan fill="#876923">HUES</tspan><tspan fill="#48443e"> = {</tspan><tspan fill="#09797c">"red"</tspan><tspan fill="#48443e">: </tspan><tspan fill="#974164">22</tspan><tspan fill="#48443e">, </tspan><tspan fill="#09797c">"green"</tspan><tspan fill="#48443e">: </tspan><tspan fill="#974164">128</tspan><tspan fill="#48443e">, </tspan><tspan fill="#09797c">"blue"</tspan><tspan fill="#48443e">: </tspan><tspan fill="#974164">215</tspan><tspan fill="#48443e">}</tspan></text>
<text x="34" y="228" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="13" fill="#b3b0ab" text-anchor="end" xml:space="preserve">10</text>
<text x="34" y="250" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="13" fill="#b3b0ab" text-anchor="end" xml:space="preserve">11</text>
<text x="46" y="250" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="13" fill="#48443e" text-anchor="start" xml:space="preserve"><tspan fill="#9d5a5d">for</tspan><tspan fill="#48443e"> name, hue </tspan><tspan fill="#9d5a5d">in</tspan><tspan fill="#48443e"> HUES.</tspan><tspan fill="#0c6a96">items</tspan><tspan fill="#48443e">():</tspan></text>
<text x="34" y="272" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="13" fill="#64605c" text-anchor="end" xml:space="preserve">12</text>
<text x="46" y="272" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="13" fill="#48443e" text-anchor="start" xml:space="preserve"><tspan fill="#48443e">    lab = </tspan><tspan fill="#495a38">lch_to_lab</tspan><tspan fill="#48443e">(</tspan><tspan fill="#974164">72.0</tspan><tspan fill="#48443e">, </tspan><tspan fill="#974164">26.0</tspan><tspan fill="#48443e">, hue)</tspan></text>
<text x="34" y="294" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="13" fill="#b3b0ab" text-anchor="end" xml:space="preserve">13</text>
<text x="46" y="294" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="13" fill="#48443e" text-anchor="start" xml:space="preserve"><tspan fill="#48443e">    </tspan><tspan fill="#632f05">print</tspan><tspan fill="#48443e">(</tspan><tspan fill="#09797c">f"lab={lab}"</tspan><tspan fill="#48443e">)</tspan></text>
